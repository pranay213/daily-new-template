<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
  <style>
    :root {
      --primary: #8b5cf6;
      --bg-main: #f8fafc;
      --bg-surface: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
    }
    [data-theme="dark"] {
      --bg-main: #020617;
      --bg-surface: #0f172a;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #1e293b;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg-main); color: var(--text-primary); margin: 0; padding: 4rem 2rem; }
    .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    
    .info h1 { font-size: 2.5rem; margin-top: 0; }
    .info p { color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem; }
    
    .contact-detail { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
    .contact-detail svg { width: 24px; height: 24px; color: var(--primary); flex-shrink: 0; }
    .contact-detail div { color: var(--text-secondary); }
    .contact-detail strong { display: block; color: var(--text-primary); margin-bottom: 0.25rem; }
    
    .form-box { background: var(--bg-surface); padding: 2.5rem; border-radius: 1rem; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; }
    input, textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--bg-main); color: var(--text-primary); font-family: inherit; font-size: 1rem; box-sizing: border-box; }
    input:focus, textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
    textarea { resize: vertical; min-height: 120px; }
    
    .btn { display: inline-block; width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 0.375rem; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="info">
      <h1>Get in touch</h1>
      <p>We'd love to hear from you. Please fill out this form or shoot us an email.</p>
      
      <div class="contact-detail">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        <div>
          <strong>Email</strong>
          hello@example.com
        </div>
      </div>
      
      <div class="contact-detail">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        <div>
          <strong>Office</strong>
          123 Market St. Suite 100<br>San Francisco, CA 94105
        </div>
      </div>
      
      <div class="contact-detail">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        <div>
          <strong>Phone</strong>
          +1 (555) 000-0000
        </div>
      </div>
    </div>
    
    <div class="form-box">
      <form onsubmit="event.preventDefault(); alert('Message sent!');">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="How can we help?" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Include all the details you can..." required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>
  </div>
</body>
</html>
