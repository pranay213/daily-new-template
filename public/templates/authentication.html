<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authentication</title>
  <style>
    :root {
      --primary: #8b5cf6;
      --bg-main: #f8fafc;
      --bg-surface: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
    }
    [data-theme="dark"] {
      --bg-main: #020617;
      --bg-surface: #0f172a;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #1e293b;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg-main); color: var(--text-primary); margin: 0; display: flex; min-height: 100vh; }
    .split { display: flex; width: 100%; }
    .left { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--bg-surface); }
    .right { flex: 1; background: linear-gradient(135deg, var(--primary), #ec4899); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    @media (max-width: 768px) { .right { display: none; } }
    
    .form-container { width: 100%; max-width: 400px; }
    .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 2rem; display: block; }
    h1 { margin: 0 0 0.5rem 0; font-size: 2rem; }
    p { color: var(--text-secondary); margin-bottom: 2rem; }
    
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; }
    input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--bg-main); color: var(--text-primary); font-family: inherit; font-size: 1rem; box-sizing: border-box; }
    input:focus { outline: 2px solid var(--primary); border-color: transparent; }
    
    .btn { display: block; width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 0.375rem; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; }
    .btn:hover { opacity: 0.9; }
    
    .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--text-secondary); font-size: 0.875rem; }
    .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid var(--border); }
    .divider::before { margin-right: 1rem; }
    .divider::after { margin-left: 1rem; }
    
    .social-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; background: transparent; color: var(--text-primary); cursor: pointer; font-weight: 500; }
    
    .footer-text { margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-secondary); }
    .footer-text a { color: var(--primary); font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>
  <div class="split">
    <div class="left">
      <div class="form-container">
        <div class="logo">Appify</div>
        <h1>Welcome back</h1>
        <p>Please enter your details to sign in.</p>
        
        <form onsubmit="event.preventDefault()">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          
          <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; margin-bottom: 1.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; font-weight: normal; cursor: pointer;">
              <input type="checkbox" style="width: auto;"> Remember me
            </label>
            <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 500;">Forgot password?</a>
          </div>
          
          <button type="submit" class="btn">Sign in</button>
        </form>
        
        <div class="divider">or</div>
        
        <button class="social-btn">
          Sign in with Google
        </button>
        
        <div class="footer-text">
          Don't have an account? <a href="#">Sign up</a>
        </div>
      </div>
    </div>
    <div class="right">
      <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Start your journey</h2>
      <p style="font-size: 1.25rem; color: rgba(255,255,255,0.8); max-width: 400px;">Join thousands of users who are already building amazing things with our platform.</p>
    </div>
  </div>
</body>
</html>
