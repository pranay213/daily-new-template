name: Daily Template Generator

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate New Template via Ollama
        env:
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: node scripts/generate_template.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/templates/ src/data/templates.js
          
          # Check if there are changes before committing
          if ! git diff-index --quiet HEAD; then
            git commit -m "feat(templates): add daily generated template [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Build React App
        run: npm run build

      # Optional: Deploy to GitHub Pages or another hosting provider
      # If using GH Pages, you would add a deployment step here
